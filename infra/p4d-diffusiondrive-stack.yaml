AWSTemplateFormatVersion: '2010-09-09'
Description: >
  P4d GPU instance for DiffusionDrive benchmark comparison against Trainium.
  Runs benchmark_gpu.py with identical frozen-backbone model configuration.

Parameters:
  InstanceType:
    Type: String
    Default: p4d.24xlarge
    AllowedValues:
      - p4d.24xlarge
      - g5.12xlarge
    Description: GPU instance type

  AmiId:
    Type: String
    Default: ami-0c7217cdde317cfec
    Description: >
      Deep Learning AMI (Ubuntu 22.04) with CUDA. Find latest:
      aws ec2 describe-images --owners amazon --filters "Name=name,Values=Deep Learning OSS Nvidia Driver AMI GPU PyTorch*Ubuntu 22.04*" --query 'Images|sort_by(@,&CreationDate)|[-1].ImageId' --output text

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch the instance in

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet (must have internet access)

  TTLHours:
    Type: Number
    Default: 6
    MinValue: 1
    MaxValue: 12
    Description: Auto-terminate after this many hours

  GitRepoUrl:
    Type: String
    MinLength: 1
    AllowedPattern: '^https?://.+\.git$|^git@.+:.+\.git$'
    ConstraintDescription: GitRepoUrl must be a non-empty Git URL ending in .git
    Description: >
      Git repository URL that hosts this sample. Required; provide it as
      a CloudFormation parameter (for example, your organization's fork URL).

  ArtifactBucketName:
    Type: String
    Default: ''
    Description: >
      (Optional) Name of an existing S3 bucket for benchmark results.
      Typically the bucket created by the trn1 stack (diffusiondrive-<stackname>-<accountid>).
      Leave blank to skip S3 uploads.

Conditions:
  HasArtifactBucket: !Not [!Equals [!Ref ArtifactBucketName, '']]

Resources:
  GPURole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: Explicit role name required for cross-stack references and operational clarity.
      checkov:
        skip:
          - id: CKV_AWS_111
            comment: S3 resource-scoped actions require wildcard for object keys within the specific bucket.
    Properties:
      RoleName: !Sub 'diffusiondrive-gpu-role-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - !If
          - HasArtifactBucket
          - PolicyName: S3ArtifactAccess
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:PutObject
                    - s3:ListBucket
                  Resource:
                    - !Sub 'arn:aws:s3:::${ArtifactBucketName}'
                    - !Sub 'arn:aws:s3:::${ArtifactBucketName}/*'
          - !Ref AWS::NoValue

  GPUInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref GPURole]

  GPUSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W40
            reason: Broad egress required for package repos, S3, and SSM endpoints during benchmark setup.
          - id: W5
            reason: Broad egress required for package repos, S3, and SSM endpoints during benchmark setup.
    Properties:
      GroupDescription: DiffusionDrive GPU benchmark instance - SSM only
      GroupName: !Sub 'diffusiondrive-gpu-sg-${AWS::StackName}'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound for S3, SSM endpoints, and package repos

  GPUInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      SubnetId: !Ref SubnetId
      SecurityGroupIds: [!GetAtt GPUSecurityGroup.GroupId]
      IamInstanceProfile: !Ref GPUInstanceProfile
      Monitoring: true
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 200
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
        HttpPutResponseHopLimit: 2
      Tags:
        - Key: Name
          Value: !Sub 'diffusiondrive-gpu-${AWS::StackName}'
        - Key: Project
          Value: end-2end-AI
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > >(tee /var/log/diffusiondrive-gpu-userdata.log) 2>&1
          echo "=== DiffusionDrive GPU Benchmark Bootstrap ==="

          # Auto-terminate safety
          echo "shutdown -h now" | at now + ${TTLHours} hours 2>/dev/null || true

          # Clone repo and install deps
          cd /home/ubuntu
          echo "Cloning from: ${GitRepoUrl}"
          git clone "${GitRepoUrl}" end-2end-AI
          pip install -q timm diffusers 2>&1 | tail -3

          # System info
          echo "=== System Info ==="
          nvidia-smi
          python3 -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPU: {torch.cuda.get_device_name(0)}')"

          # Run DiffusionDrive GPU benchmark
          cd /home/ubuntu/end-2end-AI/neuron_diffusiondrive
          python3 benchmark_gpu.py --freeze_backbone --batch_size 1 --steps 100 --inference_steps 200 \
            2>&1 | tee /tmp/dd_gpu_output.txt

          echo "=== GPU Benchmark Complete ==="

Outputs:
  InstanceId:
    Value: !Ref GPUInstance
  SSMConnect:
    Value: !Sub 'aws ssm start-session --target ${GPUInstance} --region ${AWS::Region}'
